# SSH agent socket persistence across reconnects
# The fish config.fish symlinks the real SSH_AUTH_SOCK to ~/.ssh/auth_sock on login.
# This ensures tmux panes always use the current (valid) agent socket.
set-environment -g SSH_AUTH_SOCK "$HOME/.ssh/auth_sock"

# Change prefix to C-s (matches macOS dotfiles)
unbind C-b
set -g prefix C-s
bind -r C-s send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Vi mode
setw -g mode-keys vi
set -g mouse on

# Copy mode
bind h copy-mode
bind -T copy-mode-vi v send -X begin-selection
# Server has no display; copy to tmux buffer only
# Terminal emulators with OSC 52 support (kitty, Ghostty, iTerm2) will still
# be able to copy to your laptop clipboard via the terminal itself
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splitting panes
bind | split-window -v -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'

# Break pane
bind b break-pane -d

# Keep current path when creating new window
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-tmux-navigator compatible)
bind j select-pane -D
bind k select-pane -U
bind h select-pane -L
bind l select-pane -R

# Dracula theme plugins
set -g @dracula-plugins "cpu-usage ram-usage"

# -------------
# tmux plugin manager - keep this at the bottom

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'

run '~/.tmux/plugins/tpm/tpm'
